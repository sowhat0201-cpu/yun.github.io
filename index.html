<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場實習生性格測驗｜未來職人探索</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --info: #3182ce; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--primary); line-height: 1.6; margin: 0; padding: 15px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 22px; margin-bottom: 10px; }
        .q-progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .q-progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .question-box { display: none; }
        .question-box.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .options-list { list-style: none; padding: 0; }
        .btn-opt { width: 100%; padding: 16px; margin-bottom: 10px; border: 1.5px solid #dce4ec; background: white; border-radius: 12px; cursor: pointer; font-size: 16px; text-align: left; }
        .btn-opt:hover { border-color: var(--accent); background: #ebf5fb; }
        
        #result-area { display: none; }
        .type-name { text-align: center; font-size: 28px; color: var(--accent); font-weight: 900; margin: 20px 0; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .card { padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 15px; }
        .card-light { background: #f0fff4; border-left: 6px solid var(--success); }
        .card-shadow { background: #fff5f5; border-left: 6px solid var(--danger); }
        .card-advice { background: #ebf8ff; border: 2px dashed var(--info); }
        .card-label { font-weight: bold; margin-bottom: 5px; font-size: 17px; }
        #status-msg { text-align: center; font-size: 12px; color: #95a5a6; }
        .restart-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h1>🔍 職場實習生類型測驗</h1>
        <div class="q-progress-bar"><div class="q-progress-fill" id="pb-fill"></div></div>
        <div id="question-content"></div>
    </div>

    <div id="result-area">
        <h2 style="text-align:center;">測驗結果分析</h2>
        <div id="display-type" class="type-name"></div>
        
        <div class="card card-light"><div class="card-label">✨ 正向光芒</div><div id="text-light"></div></div>
        <div class="card card-shadow"><div class="card-label">⚠️ 可能困擾</div><div id="text-shadow"></div></div>
        <div class="card card-advice"><div class="card-label">💡 進化修煉建議</div><div id="text-advice"></div></div>

        <p id="status-msg">數據回傳中...</p>
        <button class="restart-btn" onclick="location.reload()">重新測驗</button>

</div>
