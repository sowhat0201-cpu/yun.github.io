<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場實習生性格測驗｜專屬類型探索</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --info: #3182ce; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--primary); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; }
        .intro-text { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .question-box { display: none; }
        .question-box.active { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .q-progress { font-size: 14px; color: var(--accent); font-weight: bold; margin-bottom: 10px; text-align: center; }
        .options-list { list-style: none; padding: 0; }
        .options-list li { margin-bottom: 12px; }
        .btn-opt { width: 100%; padding: 16px; border: 1.5px solid #dce4ec; background: white; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 16px; text-align: left; color: #34495e; }
        .btn-opt:hover { border-color: var(--accent); background: #ebf5fb; color: var(--accent); }
        
        #result-area { display: none; text-align: left; }
        .result-title { text-align: center; font-size: 22px; color: #7f8c8d; margin-bottom: 5px; }
        .type-name { text-align: center; font-size: 32px; color: var(--accent); font-weight: 900; margin-bottom: 30px; border-bottom: 3px solid var(--accent); display: inline-block; width: 100%; padding-bottom: 10px; }
        
        .card { padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .card-light { background: #f0fff4; border-left: 6px solid var(--success); }
        .card-shadow { background: #fff5f5; border-left: 6px solid var(--danger); }
        .card-advice { background: #ebf8ff; border: 2px dashed var(--info); }
        .card-label { font-weight: bold; font-size: 18px; margin-bottom: 8px; display: flex; align-items: center; }
        
        #status-msg { text-align: center; font-size: 13px; color: #95a5a6; margin-top: 20px; }
        .restart-btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h1>🔍 職場實習生類型測驗</h1>
        <p class="intro-text">探索你的職場分身，了解如何在實習中進化！</p>
        <div id="question-content"></div>
    </div>

    <div id="result-area">
        <p class="result-title">測驗完成！你的類型是：</p>
        <div id="display-type" class="type-name"></div>
        
        <div class="card card-light">
            <div class="card-label">✨ 正向光芒</div>
            <div id="text-light"></div>
        </div>
        
        <div class="card card-shadow">
            <div class="card-label">⚠️ 可能困擾</div>
            <div id="text-shadow"></div>
        </div>
        
        <div class="card card-advice">
            <div class="card-label">💡 進化修煉建議</div>
            <div id="text-advice"></div>
        </div>

        <p id="status-msg">正在同步數據至教師系統...</p>
        <button class="restart-btn" onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
    // --- 請在此處替換為您的 Google Apps Script 網址 ---
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxa4bHsIL4rrJ2t-XE5FQbpM1jVcP2v9Ijbltz8zQXZkAdTdPiWHl0cDuC1Z4kmqdJSMg/exec';

    const quizData = [
        { q: "實習報到第一天，面對全新環境與同事，你會？", a: "觀察職稱與座位建立架構圖", b: "微笑打招呼記住大家名字", c: "思考辦公室動線哪裡可以更酷", d: "安靜待在位子等待指令" },
        { q: "拿到厚厚一疊「實習生須知」，你的閱讀習慣是？", a: "直接看最後的考核標準", b: "先看福利與員工聚餐部分", c: "隨意翻閱希望有圖解版", d: "從第一頁開始認真劃重點" },
        { q: "主管正在教導複雜的操作流程，你通常會？", a: "邊聽邊思考有沒有省時捷徑", b: "觀察主管表情表現出受教樣子", c: "想試試看不用手冊能不能成功", d: "拿出筆記本詳細記錄動作" },
        { q: "午高峰現場混亂且每個人口氣不好，你會？", a: "進入自動模式精準完成任務", b: "壓力很大擔心大家在生我的氣", c: "覺得刺激想跳出來指揮大家", d: "更加小心翼翼深怕犯錯被罵" },
        { q: "打翻了重要食材或文件，你的反應是？", a: "立刻計算損失與時間並通報", b: "非常愧疚一直跟身邊人道歉", c: "腦袋想著創意方式掩蓋或補救", d: "愣住一秒後默默開始清理" },
        { q: "對於「重複做一樣的事」，你的看法是？", a: "享受效率變快的極致感", b: "能跟同事聊天就沒關係", c: "想辦法自動化它否則很折磨", d: "很有安全感喜歡知道要做什麼" },
        { q: "發現學長姐流程有誤，你會？", a: "拿數據證據私下提醒他", b: "委婉詢問：這樣做會更好嗎？", c: "在心裡笑他改用新方法做給他看", d: "覺得他是前輩照做就好" },
        { q: "大家在抱怨主管很兇，你會？", a: "冷靜分析主管兇的背後邏輯", b: "帶頭安慰受挫同事提供情緒價值", c: "講主管笑話化解氣氛", d: "默默聽著不發表意見怕被傳出去" },
        { q: "主管突然交辦沒學過的任務且明天要交？", a: "通宵查資料把它做出來", b: "找關係好的同事求助帶我做", c: "興奮終於不用做無聊的事了", d: "焦慮希望能有詳細範本參考" },
        { q: "你最喜歡的主管類型是？", a: "講求邏輯、不講廢話", b: "親切理解我感受的主管", c: "給我很大發揮空間不愛管細節", d: "指令清晰讓我很有安全感" },
        { q: "在團隊中你覺得自己最像？", a: "大腦（分析決策）", b: "心臟（聯繫感情）", c: "手腳（行動實驗）", d: "脊椎（穩定支撐）" },
        { q: "工作出錯需要「扛責」時，你的態度是？", a: "絕對負責並提交改進報告", b: "因為拖累大家而難過很久", c: "解釋動機希望大家看重初衷", d: "認錯接受處分後更加謹慎" },
        { q: "對於職場中的「社交應酬」看法？", a: "除非對升遷有助否則浪費時間", b: "非常重要是建立默契時刻", c: "喜歡有趣討厭死板應酬", d: "覺得累只想趕快回家休息" },
        { q: "主管稱讚你做得好，內心獨白是？", a: "正常發揮，我確實比別人有效率", b: "主管終於認可我了要更努力", c: "下次試更瘋狂做法讓他驚訝", d: "鬆口氣不用擔心表現不好了" },
        { q: "創意被主管當眾否決時？", a: "詢問理由回家優化再提", b: "覺得受挫是否我這個人有問題", c: "覺得主管沒眼光默默給他扣分", d: "喔好那我就照舊方法做" },
        { q: "發現還有很多技能沒學會，你會？", a: "整理清單找主管前輩請教", b: "結交到的朋友比技能更重要", c: "打算回家自己實驗不被限制", d: "遺憾但不敢主動要求學習" },
        { q: "在忙碌環境中，最受不了哪種同事？", a: "慢吞吞還一直出錯的人", b: "口氣差不顧別人感受的人", c: "墨守成規一點彈性都沒有的人", d: "喜怒無常指令變來變去的人" },
        { q: "發現公司有潛在巨大危機？", a: "提出數據化解決方案", b: "跟信任同事商量看大家想法", c: "覺得是改變現狀機會想試奇招", d: "告訴直屬主管聽從指示" },
        { q: "職場情緒管理最難的是？", a: "面對蠢問題保持專業", b: "面對衝突保持微笑", c: "面對無聊保持熱情", d: "面對壓力保持清醒" },
        { q: "結束實習當天，希望留下的印象？", a: "專業且高產能的人才", b: "溫暖好相處貼心的夥伴", c: "思維跳躍有潛力的新星", d: "認真負責穩定的基石" }
    ];

    let tally = { a: 0, b: 0, c: 0, d: 0 };
    let step = 0;

    function draw() {
        if (step >= quizData.length) { finish(); return; }
        const item = quizData[step];
        document.getElementById('question-content').innerHTML = `
            <div class="question-box active">
                <div class="q-progress">進度：${step + 1} / ${quizData.length}</div>
                <p style="font-size:18px; font-weight:bold; margin-bottom:20px;">${item.q}</p>
                <ul class="options-list">
                    <li><button class="btn-opt" onclick="tap('a')">(A) ${item.a}</button></li>
                    <li><button class="btn-opt" onclick="tap('b')">(B) ${item.b}</button></li>
                    <li><button class="btn-opt" onclick="tap('c')">(C) ${item.c}</button></li>
                    <li><button class="btn-opt" onclick="tap('d')">(D) ${item.d}</button></li>
                </ul>
            </div>`;
    }

    function tap(choice) { tally[choice]++; step++; draw(); }

    function finish() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);

        let top = Object.keys(tally).reduce((a, b) => tally[a] > tally[b] ? a : b);
        let finalType = "";
        let lightText = "";
        let shadowText = "";
        let adviceText = "";

        if (top === 'a') {
            finalType = "精準高效的領航員";
            lightText = "你是單位的戰鬥力基石，邏輯極強，追求卓越與效率。交給你的任務總能準確達成。";
            shadowText = "追求效率時容易顯得冷漠，對人要求過高會讓同事壓力巨大，甚至覺得你像台冰冷的機器。";
            adviceText = "在指正別人前先說聲「辛苦了」。學習理解職場中除了正確與否，還有情感的潤滑。";
        } else if (top === 'b') {
            finalType = "溫暖感性的潤滑劑";
            lightText = "具備極高共感力，能觀察他人情緒並緩解緊繃氣氛，是大家最信任的傾訴對象。";
            shadowText = "容易因為在意他人感受而難以拒絕無理要求，或為了顧及面子不敢指出錯誤，導致進度受阻。";
            adviceText = "練習「對事不對人」。指出問題並不代表你討厭對方，而是對團隊的成果負責。";
        } else if (top === 'c') {
            finalType = "靈感爆棚的開拓者";
            lightText = "點子多、敢挑戰。你能為僵化的流程帶來創意，在解決突發問題時總能閃耀光芒。";
            shadowText = "想法多但容易「三分鐘熱度」，常把繁瑣的收尾工作留給同事，或因忽視 SOP 導致風險。";
            adviceText = "練習完整執行一個點子直到「落地」為止。理解規則是為了安全，這能建立你的專業信用。";
        } else {
            finalType = "踏實穩定的守護者";
            lightText = "沉穩耐操，對交辦事務極度負責。你是單位最穩定的基石，能把平凡的事做得極其細緻。";
            shadowText = "應變力較弱，遇到計畫變動容易慌張。習慣被動等待指令，會讓主管覺得你缺乏主見。";
            adviceText = "練習「主動回報」進度，並在執行任務時多想一個「備案」，這能提升你的應變自信。";
        }

        document.getElementById('display-type').innerText = finalType;
        document.getElementById('text-light').innerText = lightText;
        document.getElementById('text-shadow').innerText = shadowText;
        document.getElementById('text-advice').innerText = adviceText;

        // 背景上傳 Google Sheet
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'result=' + encodeURIComponent(finalType)
        }).then(() => {
            document.getElementById('status-msg').innerText = "數據已成功回傳至教師系統，感謝您的填寫！";
        }).catch(() => {
            document.getElementById('status-msg').innerText = "上傳失敗，但您的測驗結果已顯示如上。";
        });
    }

    draw();
</script>
</body>
</html>
